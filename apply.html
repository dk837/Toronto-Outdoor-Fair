<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vendor Application | Ottawa Summer Food & Cultural Fair (Demo)</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

.application{
max-width:900px;
margin:120px auto;
padding:40px;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.application h1{
text-align:center;
color:#d62828;
margin-bottom:30px;
}

form{
display:grid;
gap:18px;
}

input,select,textarea{

padding:14px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;

}

textarea{
height:150px;
resize:vertical;
}

button{

background:#d62828;
color:white;
padding:16px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#b71c1c;

}

.notice{

background:#fff8dc;
padding:20px;
border-left:5px solid orange;
margin-bottom:30px;

}

</style>

</head>

<body>

<div class="application">

<h1>Vendor Application</h1>

<div class="notice">

<strong>Demo Website</strong><br><br>

This is a fictional demonstration website.

No real applications or payments are accepted.

</div>

<form>

<input
type="text"
placeholder="Business Name"
required>

<input
type="text"
placeholder="Contact Person"
required>

<input
type="email"
placeholder="Email Address"
required>

<input
type="tel"
placeholder="Phone Number">

<select required>

<option>Select Vendor Type</option>

<option>Food Vendor</option>

<option>Food Truck</option>

<option>Artisan</option>

<option>Craft Vendor</option>

<option>Retail Vendor</option>

</select>

<select>

<option>Select Booth Size</option>

<option>10 x 10 Booth</option>

<option>10 x 20 Booth</option>

<option>Food Truck Space</option>

</select>

<textarea
placeholder="Describe the products or services you intend to sell."></textarea>

<h3> e-Transfer Instructions</h3>

<p> Use e transfer infoottawa vendors@gmail.com
    <button type="submit">

Submit Demo Application

</button>

</form>

</div>

</body>

</html>
